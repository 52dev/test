                size_bytes:
                    type: string
                    description: 'SizeBytes: 对象大小（字节数，可选）'
            description: ObjectStats 对象统计信息，对应Go中的 ObjectStats 结构体
        Pagination:
            type: object
            properties:
                has_more:
                    type: boolean
                    description: 'HasMore: 是否有下一页'
                max_per_page:
                    type: integer
                    description: 'MaxPerPage: 每页最大条目数'
                    format: int32
                next_offset:
                    type: string
                    description: 'NextOffset: 下一页的偏移量令牌'
                results:
                    type: integer
                    description: 'Results: 当前页的结果数量'
                    format: int32
        Quota:
            type: object
            properties:
                cpu:
                    type: string
                memory:
                    type: string
                storage:
                    type: string
                gpu:
                    type: string
        Ref:
            type: object
            properties:
                commitId:
                    type: string
                id:
                    type: string
        RegisterTenantReq:
            type: object
            properties:
                displayName:
                    type: string
                    description: 用户只需提供显示名称，系统自动生成唯一 ID
                quota:
                    allOf:
                        - $ref: '#/components/schemas/TenantQuota'
                    description: 初始配额定义
        ResourceLimit:
            type: object
            properties:
                name:
                    type: string
                nominalQuota:
                    type: string
        RestartSandboxRequest:
            type: object
            properties:
                id:
                    type: string
            description: 重启沙箱请求
        RestartSandboxResponse:
            type: object
            properties:
                count:
                    type: integer
                    format: int32
            description: 重启沙箱响应
        Sandbox:
            required:
                - name
            type: object
            properties:
                id:
                    type: string
                    description: 沙箱ID
                name:
                    maxLength: 20
                    pattern: ^[a-z0-9]{1,20}$
                    type: string
                    description: 沙箱名称，仅允许小写字母和数字，长度不超过20个字符
                modelId:
                    type: string
                    description: 关联模型ID
                modelName:
                    type: string
                    description: 模型名称
                tenantName:
                    type: string
                    description: 所属租户
                status:
                    enum:
                        - UNSPECIFIED
                        - CREATING
                        - RUNNING
                        - STOPPED
                        - RESTARTING
                        - ERROR
                        - DELETING
                        - EXPIRED
                    type: string
                    description: 状态
                    format: enum
                config:
                    example: null
                    type: object
                    additionalProperties:
                        type: string
                description:
                    type: string
                    description: 描述
                remark:
                    type: string
                    description: 备注
                quota:
                    $ref: '#/components/schemas/Quota'
                deploymentName:
                    readOnly: true
                    type: string
                    description: 关联的K8s Deployment名称
                url:
                    type: string
                    description: url
                commandMapping:
                    type: object
                    additionalProperties:
                        type: string
                    description: '命令映射，用于不同环境下的命令适配，例如 {''start'': ''python app.py'', ''jupyter'': ''jupyter notebook --ip=}'
                env:
                    type: object
                    additionalProperties:
                        type: string
                    description: '环境变量，键值对形式，例如 {''ENV_VAR1'': ''value1'', ''ENV_VAR2'': ''value2''}'
                startedAt:
                    type: string
                    description: 启动时间
                    format: date-time
                finishedAt:
                    type: string
                    description: 结束时间
                    format: date-time
                expirationMinutes:
                    type: string
                    description: 过期时间
                billingDurationSec:
                    type: string
                    description: 计费时长
                createdAt:
                    type: string
                    description: 创建时间
                    format: date-time
                updatedAt:
                    type: string
                    description: 更新时间
                    format: date-time
                deletedAt:
                    type: string
                    description: 删除时间
                    format: date-time
            description: 沙箱详情信息
        StartSandboxRequest:
            type: object
            properties:
                id:
                    type: string
            description: 启动沙箱请求
        StopSandboxRequest:
            type: object
            properties:
                id:
                    type: string
            description: 停止沙箱请求
        TenantDetailResp:
            type: object
            properties:
                tenantName:
                    type: string
                displayName:
                    type: string
                namespace:
                    type: string
                cohort:
                    type: string
                nominalQuota:
                    $ref: '#/components/schemas/TenantQuota'
                usedQuota:
                    $ref: '#/components/schemas/TenantQuota'
        TenantQuota:
            type: object
            properties:
                flavors:
                    type: array
                    items:
                        $ref: '#/components/schemas/FlavorQuota'
                    description: 定义该租户拥有的资源上限
        UpdateModelRequest:
            type: object
            properties:
                id:
                    type: string
                data:
                    $ref: '#/components/schemas/Model'
                updateMask:
                    example: id,realname,username
                    type: string
                    description: 要更新的字段列表
                    format: field-mask
                allowMissing:
                    type: boolean
                    description: 如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。
            description: 更新模型请求
        UpdateSandboxRequest:
            type: object
            properties:
                id:
                    type: string
                data:
                    $ref: '#/components/schemas/Sandbox'
                updateMask:
                    example: id,realname,username
                    type: string
                    description: 要更新的字段列表
                    format: field-mask
                allowMissing:
                    type: boolean
                    description: 如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。
            description: 更新沙箱请求
        UpdateTenantQuotaReq:
            type: object
            properties:
                tenantName:
                    type: string
                quota:
                    $ref: '#/components/schemas/TenantQuota'
    responses:
        default:
            description: default kratos response
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/KratosStatus'
    securitySchemes:
        OAuth2PasswordBearer:
            type: oauth2
            flows:
                password:
                    tokenUrl: /admin/v1/login
                    refreshUrl: /admin/v1/refresh-token
                    scopes: {}
security:
    - OAuth2PasswordBearer: []
tags:
    - name: InferenceService
      description: '-------------------------- 沙箱服务定义 --------------------------'
    - name: ModelService
      description: '-------------------------- 沙箱服务定义 --------------------------'
    - name: SandboxService
      description: '-------------------------- 沙箱服务定义 --------------------------'
    - name: TenantService
