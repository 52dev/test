syntax = "proto3";

package inference.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/api/field_behavior.proto";

import "pagination/v1/pagination.proto";

// 推理框架类型枚举（和JSON中的framework_type对应）
enum FrameworkType {
  FRAMEWORK_TYPE_UNSPECIFIED = 0;  // 默认值（未指定）
  FRAMEWORK_TYPE_VLLM = 1;         // VLLM框架
  FRAMEWORK_TYPE_SGLANG = 2;       // SGLang框架
  FRAMEWORK_TYPE_TENSORRT = 3;     // TensorRT框架
}

// VLLM专属配置（对应JSON中的vllm_config）
message VllmConfig {
  string quantization = 1;          // 量化方式：gptq/awq/none
  int32 tensor_parallel_size = 2;   // 张量并行数
  bool enforce_eager = 3;           // 是否禁用CUDA图
  bool disable_log_stats = 4;       // 扩展：是否禁用统计日志（可选）
  float gpu_memory_utilization = 5; // 扩展：GPU内存利用率（如0.9）
}

// SGLang专属配置（对应JSON中的sglang_config）
message SglangConfig {
  bool enable_prefix_caching = 1;   // 是否开启前缀缓存
  int32 max_num_seqs = 2;           // 最大并发序列数
  int32 max_context_len = 3;        // 扩展：最大上下文长度
  bool enable_chunked_prefill = 4;  // 扩展：是否开启分块预填充
}

// TensorRT专属配置（对应JSON中的tensorrt_config）
message TensorrtConfig {
  string engine_path = 1;           // TRT引擎路径（模型挂载目录下）
  string precision = 2;             // 精度：fp16/int8/fp32
  int32 max_workspace_size = 3;     // 扩展：最大工作空间大小（MB）
  bool enable_dynamic_shape = 4;    // 扩展：是否启用动态形状
}

// 通用推理框架配置（核心，对应完整的config_json）
message InferFrameworkConfig {
  // 通用配置（所有框架共享）
  FrameworkType framework_type = 1;          // 框架类型
  string model_version = 2;                  // LakeFS模型版本（如chatglm3:v1.0）
  string model_mount_path = 3;               // 容器内模型挂载路径
  int32 gpu_num = 4;                         // GPU数量
  int32 port = 5;                            // 推理服务端口
  int32 max_batch_size = 6;                  // 最大批处理数
  int32 max_tokens = 7;                      // 最大生成token数

  // 框架专属配置（oneof确保互斥，避免冗余）
  oneof framework_specific_config {
    VllmConfig vllm_config = 8;              // VLLM专属配置
    SglangConfig sglang_config = 9;          // SGLang专属配置
    TensorrtConfig tensorrt_config = 10;     // TensorRT专属配置
  }
}

